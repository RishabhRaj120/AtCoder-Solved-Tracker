<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Settings - AtCoder Solved Tracker</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h2>AtCoder Tracker Settings</h2>
    
    <div class="section">
      <h3>Account</h3>
      <label>Username</label>
      <div class="input-group">
        <input type="text" id="username-input" />
        <button id="save-username-btn" class="primary-btn">Save</button>
      </div>
    </div>

    <div class="section">
      <h3>Data Sync</h3>
      <p>The extension automatically syncs new submissions in the background every 6 hours. You can manually force a full synchronization or clear the cache.</p>
      <button id="force-sync-btn">Force Full Resync</button>
      <button id="clear-cache-btn" class="danger-btn">Clear Local Cache</button>
      <p id="sync-status" class="status-msg"></p>
    </div>

    <div class="footer">
      Version <span id="version-display"></span>
    </div>
  </div>
  <script src="../utils/constants.js"></script>
  <script src="../utils/storage.js"></script>
  <script src="options.js"></script>
</body>
</html>
